<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おみやげ配布⭐️あみだくじ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');
        
        :root {
            --ink: #334155;
            --muted: #64748b;
            --line: #eadce5;
            --rose: #ff5f93;
            --pink: #ff86b7;
            --peach: #ffc7a8;
            --butter: #ffe681;
            --sky: #8bd3ff;
            --mint: #9ee6c4;
            --lavender: #c7b8ff;
            --milk: #fffafd;
            --surface: rgba(255, 255, 255, 0.86);
            --shadow: 0 24px 70px rgba(51, 65, 85, 0.13), 0 2px 8px rgba(255, 134, 183, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #fff7fb;
            background-image:
                radial-gradient(circle at 1px 1px, rgba(255, 95, 147, 0.14) 1px, transparent 0),
                linear-gradient(120deg, rgba(255, 134, 183, 0.16), transparent 36%),
                linear-gradient(240deg, rgba(139, 211, 255, 0.18), transparent 34%),
                linear-gradient(180deg, #fff7fb 0%, #f8fcff 52%, #fffaf2 100%);
            background-size: 24px 24px, auto, auto, auto;
            color: var(--ink);
            overflow-x: hidden;
            position: relative;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            left: 0;
            right: 0;
            z-index: 30;
            pointer-events: none;
        }

        body::before {
            top: 0;
            height: 12px;
            background: repeating-linear-gradient(
                90deg,
                var(--pink) 0 36px,
                var(--butter) 36px 72px,
                var(--sky) 72px 108px,
                var(--mint) 108px 144px
            );
        }

        body::after {
            bottom: 0;
            height: 10px;
            background: linear-gradient(90deg, var(--lavender), var(--pink), var(--peach), var(--butter));
            opacity: 0.55;
        }

        .pop-deco {
            position: fixed;
            pointer-events: none;
            z-index: 2;
            display: grid;
            width: 42px;
            height: 42px;
            place-items: center;
            border: 1px solid rgba(255, 134, 183, 0.28);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.72);
            box-shadow: 0 16px 34px rgba(51, 65, 85, 0.09);
            opacity: 0.8;
            animation: stickerFloat 7s ease-in-out infinite;
        }

        @keyframes stickerFloat {
            0%, 100% { transform: translateY(0) rotate(-4deg); }
            50% { transform: translateY(-12px) rotate(4deg); }
        }

        @media (max-width: 700px) {
            .pop-deco {
                display: none;
            }
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            border: 1px solid rgba(255, 134, 183, 0.34);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 24px rgba(255, 134, 183, 0.16);
            color: var(--rose);
            font-size: 0.68rem;
            font-weight: 900;
            padding: 0.3rem 0.65rem;
            white-space: nowrap;
        }

        .site-header {
            min-height: clamp(250px, 33vw, 360px);
            margin: -1.5rem -1rem 1.5rem;
            padding: 3.25rem 1rem 2.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            isolation: isolate;
        }

        .header-bg-video,
        .header-bg-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .header-bg-video {
            z-index: -2;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.72;
            filter: saturate(1.02) brightness(0.7);
        }

        .header-bg-overlay {
            z-index: -1;
            background-image:
                linear-gradient(180deg, rgba(255, 250, 253, 0.36), rgba(255, 250, 253, 0.48)),
                radial-gradient(circle at 1px 1px, rgba(15, 23, 42, 0.3) 0.55px, transparent 0.9px);
            background-size: auto, 9px 9px;
        }

        @media (min-width: 768px) {
            .site-header {
                margin: -2.5rem -2rem 1.75rem;
                padding: 4rem 2rem 2.75rem;
            }
        }

        .hero-title {
            display: inline-flex;
            align-items: center;
            gap: 0.05em;
            color: var(--ink);
            font-size: clamp(2.2rem, 9vw, 4.6rem);
            font-weight: 900;
            letter-spacing: 0;
            line-height: 0.95;
            text-shadow: 0 4px 0 rgba(255, 230, 129, 0.65);
        }

        .hero-title-main {
            background: linear-gradient(90deg, #ff4f92 0%, #ff8f70 46%, #7a7cf6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-title-star {
            color: var(--butter);
            -webkit-text-fill-color: var(--butter);
            filter: drop-shadow(0 3px 0 rgba(255, 95, 147, 0.34));
        }

        .hero-logo {
            display: block;
            width: min(78vw, 700px);
            height: auto;
            max-height: clamp(84px, 14vw, 150px);
            object-fit: contain;
            filter:
                drop-shadow(0 0 5px rgba(255, 255, 255, 0.98))
                drop-shadow(0 0 12px rgba(255, 255, 255, 0.86))
                drop-shadow(0 8px 0 rgba(255, 255, 255, 0.78))
                drop-shadow(0 16px 24px rgba(51, 65, 85, 0.2));
        }

        .hero-kicker {
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 900;
            letter-spacing: 0.12em;
            -webkit-text-stroke: 0.45px rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 7px rgba(255, 255, 255, 0.95), 0 2px 9px rgba(15, 23, 42, 0.18);
        }

        .hero-subcopy {
            color: #475569;
            -webkit-text-stroke: 0.35px rgba(255, 255, 255, 0.92);
            text-shadow: 0 0 7px rgba(255, 255, 255, 0.95), 0 2px 9px rgba(15, 23, 42, 0.2);
        }

        .canvas-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            padding: clamp(12px, 3vw, 24px);
            border: 1px solid rgba(234, 220, 229, 0.95);
            border-radius: 8px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 251, 253, 0.92)),
                repeating-linear-gradient(90deg, rgba(139, 211, 255, 0.1) 0 1px, transparent 1px 48px);
            box-shadow: var(--shadow);
        }

        .canvas-container::before {
            content: '';
            position: absolute;
            inset: 0 0 auto 0;
            height: 6px;
            background: linear-gradient(90deg, var(--pink), var(--butter), var(--sky), var(--mint));
        }

        canvas {
            cursor: pointer;
            touch-action: none;
            display: block;
            width: 100%;
            height: auto;
            max-width: 100%;
            image-rendering: -webkit-optimize-contrast;
        }

        .btn-pop {
            border: 0 !important;
            border-radius: 8px !important;
            box-shadow: 0 12px 24px rgba(51, 65, 85, 0.12);
            font-weight: 900;
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
        }

        .btn-pop:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 32px rgba(51, 65, 85, 0.16);
            filter: saturate(1.04);
        }

        .btn-pop:active {
            transform: translateY(1px) scale(0.99);
            box-shadow: 0 8px 16px rgba(51, 65, 85, 0.12);
        }

        .btn-pop:focus-visible,
        input:focus-visible {
            outline: 3px solid rgba(139, 211, 255, 0.58);
            outline-offset: 3px;
        }

        .animate-float {
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-7px); }
        }

        .pop-card {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(234, 220, 229, 0.9);
            border-radius: 8px !important;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 250, 253, 0.88)),
                linear-gradient(90deg, rgba(255, 230, 129, 0.22), rgba(139, 211, 255, 0.16));
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
        }

        .pop-card::before {
            content: '';
            position: absolute;
            inset: 0 0 auto 0;
            height: 8px;
            background: linear-gradient(90deg, var(--pink), var(--butter), var(--sky), var(--mint), var(--lavender));
            pointer-events: none;
        }

        .soft-panel {
            border: 1px solid rgba(234, 220, 229, 0.9);
            border-radius: 8px !important;
            background: rgba(255, 255, 255, 0.82);
            box-shadow: 0 16px 36px rgba(51, 65, 85, 0.08);
            backdrop-filter: blur(12px);
        }

        .helper-note {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 0.95rem;
            border: 1px solid rgba(255, 134, 183, 0.28);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.84);
            box-shadow: 0 12px 26px rgba(255, 134, 183, 0.12);
            color: var(--rose);
            font-size: 0.9rem;
            font-weight: 900;
        }

        .setup-mascot {
            position: absolute;
            top: 2.35rem;
            right: clamp(2.25rem, 6vw, 4.75rem);
            z-index: 5;
            width: clamp(64px, 9vw, 96px);
            filter: drop-shadow(0 18px 26px rgba(51, 65, 85, 0.16));
        }

        .setup-mascot .hero-badge {
            font-size: 0.5rem;
            padding: 0.18rem 0.42rem;
        }

        @media (max-width: 820px) {
            .setup-mascot {
                position: relative;
                top: auto;
                right: auto;
                margin: -0.5rem auto 1.25rem;
                width: 76px;
            }
        }

        .mini-stat {
            border: 1px solid rgba(234, 220, 229, 0.95);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.82);
            box-shadow: 0 12px 28px rgba(51, 65, 85, 0.07);
            padding: 0.85rem 1rem;
            text-align: center;
        }

        .mini-stat span {
            display: block;
            color: var(--muted);
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            margin-bottom: 0.2rem;
        }

        .mini-stat strong {
            display: block;
            color: var(--ink);
            font-size: 1.25rem;
            font-weight: 900;
        }

        .input-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 0.75rem;
            align-items: end;
            margin-top: 0.5rem;
        }

        @media (min-width: 640px) {
            .input-grid {
                grid-template-columns: minmax(0, 1fr) 96px auto;
            }
        }

        #setup-panel,
        #game-panel {
            scroll-margin-top: 24px;
        }

        #bulk-name,
        #bulk-count,
        #count-input {
            color: var(--ink);
        }

        #bulk-name,
        #bulk-count {
            border-color: rgba(234, 220, 229, 0.95) !important;
            border-radius: 8px !important;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        #bulk-name:focus,
        #bulk-count:focus {
            border-color: rgba(255, 95, 147, 0.5) !important;
            box-shadow: 0 0 0 5px rgba(255, 134, 183, 0.14);
        }

        #prize-lineup,
        #result-message,
        #summary-modal > div {
            border: 1px solid rgba(234, 220, 229, 0.95) !important;
            border-radius: 8px !important;
            box-shadow: var(--shadow);
        }

        #summary-modal > div {
            overflow: hidden;
        }

        .animate-pop-in {
            animation: popIn 0.48s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes popIn {
            from { opacity: 0; transform: translateY(10px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .animate-fade-in {
            animation: fadeIn 0.36s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 250, 253, 0.9);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--pink), var(--sky));
            border-radius: 10px;
        }
        
        .modal-overlay {
            background-color: rgba(255, 247, 251, 0.58);
            backdrop-filter: blur(12px);
        }

        .setup-mascot img {
            max-width: 78px !important;
            height: auto !important;
        }

        @media (min-width: 768px) {
            .setup-mascot img {
                max-width: 132px !important;
            }
        }
    </style>
</head>
<body class="p-4 pt-8 md:p-8 md:pt-10 pb-40 min-h-screen relative">
    <!-- 背景デコ -->
    <div class="pop-deco text-2xl" style="top: 12%; left: 5%; color: var(--pink); animation-delay: 0s;"><i class="fas fa-heart"></i></div>
    <div class="pop-deco text-3xl" style="top: 16%; right: 6%; color: var(--butter); animation-delay: -1s;"><i class="fas fa-star"></i></div>
    <div class="pop-deco text-2xl" style="bottom: 22%; left: 8%; color: var(--sky); animation-delay: -2s;"><i class="fas fa-cloud"></i></div>
    <div class="pop-deco text-2xl" style="bottom: 12%; right: 10%; color: var(--mint); animation-delay: -3s;"><i class="fas fa-gift"></i></div>

    <header class="site-header text-center animate-pop-in relative z-10">
        <video class="header-bg-video" autoplay muted loop playsinline preload="metadata" aria-hidden="true">
            <source src="./おみやげ.mp4" type="video/mp4">
        </video>
        <div class="header-bg-overlay" aria-hidden="true"></div>

        <div class="flex flex-row items-center justify-center gap-3 md:gap-5 px-2 overflow-visible max-w-full relative z-10">
            <div class="text-center py-2 min-w-0">
                <div class="inline-block relative animate-float" style="animation-delay: -0.5s;">
                    <h1 class="relative z-10 py-1">
                        <img class="hero-logo" src="./ChatGPT Image 2026年5月6日 15_26_18.webp" alt="お土産専用あみだくじ">
                    </h1>
                </div>
                <p class="hero-kicker mt-2">OMIYAGE LUCKY BOARD</p>
                <p class="hero-subcopy mt-2 text-xs md:text-sm font-black">何が当たるかな？</p>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto relative z-10 mb-20">

        <!-- 設定エリア -->
        <div id="setup-panel" class="pop-card p-5 md:p-9 animate-fade-in">
            <div class="setup-mascot animate-float">
                <img src="assets/koho.png" alt="広報" class="w-full h-auto object-contain">
                <div class="hero-badge absolute -top-1 -right-3 rotate-6 z-20">
                    <i class="fas fa-sparkles"></i> ラッキー係
                </div>
            </div>
            <div class="relative z-10 mb-6 flex justify-center md:justify-start">
                <div class="helper-note">
                    <i class="fas fa-sparkles text-yellow-400"></i>
                    今日の運だめし、かわいくシャッフル
                </div>
            </div>
            
            <!-- 上段：人数設定 -->
            <div class="relative z-10 flex flex-col items-center justify-center mb-8 pb-6 border-b border-pink-100/80">
                <label class="font-black text-xl text-slate-700 mb-4 flex items-center">
                    <span class="bg-sky-100 text-sky-500 rounded-lg w-8 h-8 flex items-center justify-center mr-2"><i class="fas fa-users"></i></span>
                    参加人数を決めてね
                </label>
                <div class="flex items-center bg-white/80 rounded-lg p-2 gap-3 border border-pink-100 shadow-sm">
                    <button onclick="changeCount(-1)" class="btn-pop w-12 h-12 bg-white text-pink-500 font-black text-2xl flex-shrink-0" aria-label="人数を減らす">-</button>
                    <input type="number" id="count-input" value="4" min="2" max="100" onchange="updateCountFromInput()" class="w-24 text-center font-black text-4xl bg-transparent focus:outline-none focus:bg-white rounded-lg p-1">
                    <button onclick="changeCount(1)" class="btn-pop w-12 h-12 bg-pink-400 text-white font-black text-2xl flex-shrink-0" aria-label="人数を増やす">+</button>
                </div>
                <p class="text-xs text-slate-400 mt-2">※画面に合わせて縮小表示されます</p>
            </div>

            <!-- 中段：商品設定 -->
            <div class="relative z-10 bg-white/60 backdrop-blur-sm p-5 md:p-6 rounded-lg mb-8 border border-yellow-100">
                <div class="absolute -top-4 left-5 bg-gradient-to-r from-yellow-300 to-pink-300 text-slate-700 font-black px-4 py-1 rounded-full text-sm shadow-sm transform -rotate-1">
                    <i class="fas fa-gift mr-1"></i> 商品リスト
                </div>

                <div class="input-grid mb-4">
                    <div class="min-w-0">
                        <label class="text-xs text-slate-500 font-black ml-1">なにが当たる？</label>
                        <input type="text" id="bulk-name" placeholder="例: 🍰 ケーキ" class="w-full border px-4 py-3 focus:outline-none bg-white/90 font-bold placeholder-pink-200 transition-all" onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('bulk-count').select()}">
                    </div>
                    <div class="w-full sm:w-24">
                        <label class="text-xs text-slate-500 font-black ml-1">いくつ？</label>
                        <input type="number" id="bulk-count" value="1" min="1" class="w-full border px-3 py-3 focus:outline-none text-center bg-white/90 font-bold" onkeydown="if(event.key==='Enter') addBulkItem()">
                    </div>
                    <button onclick="addBulkItem()" class="btn-pop bg-gradient-to-r from-yellow-300 to-pink-300 text-slate-700 font-black px-6 py-3 h-[52px] w-full sm:w-auto">
                        <i class="fas fa-plus"></i> 追加
                    </button>
                </div>

                <div class="bg-white/86 rounded-lg p-4 shadow-inner border border-pink-100 min-h-[100px] max-h-[300px] overflow-y-auto custom-scrollbar">
                    <ul id="bulk-list" class="space-y-2">
                        <li class="text-slate-300 text-center py-6 flex flex-col items-center font-bold">
                            <i class="fas fa-magic mb-2 text-pink-200 text-3xl"></i>
                            <span>ここに商品を追加してね！</span>
                        </li>
                    </ul>
                </div>
                
                <p class="text-right text-xs text-slate-400 font-bold mt-2 mr-1">
                    ※入力が人数より少ない分は「★」になります
                </p>

                <div class="mt-4 grid gap-3 sm:grid-cols-3">
                    <div class="mini-stat">
                        <span>参加人数</span>
                        <strong id="preview-people">4人</strong>
                    </div>
                    <div class="mini-stat">
                        <span>おみやげ</span>
                        <strong id="preview-prizes">0個</strong>
                    </div>
                    <div class="mini-stat">
                        <span>★の数</span>
                        <strong id="preview-blanks">4個</strong>
                    </div>
                </div>
                <p id="preview-message" class="mt-4 text-sm font-black text-slate-600 bg-white/80 border border-pink-100 rounded-lg px-4 py-3 text-center shadow-sm">まだ商品が入っていないよ。追加するとワクワク度アップ！</p>
            </div>

            <!-- アニメーション速度 -->
            <div class="relative z-10 flex items-center justify-center gap-3 mb-6 flex-wrap">
                <span class="text-sm font-black text-slate-500"><i class="fas fa-gauge mr-1 text-sky-400"></i>速さ</span>
                <div class="flex gap-2">
                    <button onclick="setSpeed('slow')" id="speed-slow" class="px-4 py-2 rounded-lg text-sm font-black border border-sky-100 bg-white/80 text-sky-500 transition-all">おそい</button>
                    <button onclick="setSpeed('normal')" id="speed-normal" class="px-4 py-2 rounded-lg text-sm font-black border border-pink-300 bg-pink-400 text-white transition-all">ふつう</button>
                    <button onclick="setSpeed('fast')" id="speed-fast" class="px-4 py-2 rounded-lg text-sm font-black border border-sky-100 bg-white/80 text-sky-500 transition-all">はやい</button>
                </div>
            </div>

            <!-- 作成ボタン -->
            <div class="text-center">
                <button onclick="generateAmida()" class="btn-pop w-full md:w-2/3 px-12 py-5 bg-gradient-to-r from-pink-400 via-rose-400 to-orange-300 text-white text-xl font-black flex items-center justify-center mx-auto tracking-wide">
                    <i class="fas fa-wand-magic-sparkles mr-2"></i> スタート！
                </button>
            </div>
        </div>

        <!-- あみだくじ表示エリア -->
        <div id="game-panel" class="hidden space-y-6 animate-fade-in pb-20">
            <div class="soft-panel p-4 text-center">
                <p class="text-sm md:text-base font-black text-slate-600">
                    <i class="fas fa-hand-pointer text-yellow-400 mr-2"></i>
                    上のまるをタップすると、ひとりずつ結果が見られるよ
                </p>
            </div>
            
            <div class="soft-panel flex flex-wrap justify-between items-center p-4 gap-3">
                <button onclick="resetView()" class="text-pink-500 hover:text-pink-600 font-black px-3 py-2 btn-pop bg-white">
                    <i class="fas fa-chevron-left mr-1"></i> もどる
                </button>
                <div class="flex gap-3">
                     <button onclick="resetPaths()" class="px-5 py-2 bg-white text-slate-500 font-black hover:bg-slate-50 transition btn-pop text-sm">
                        <i class="fas fa-undo mr-1"></i> もう一回
                    </button>
                    <button onclick="revealAll()" class="px-5 py-2 bg-sky-400 text-white font-black hover:bg-sky-500 transition btn-pop text-sm">
                        <i class="fas fa-eye mr-1"></i> 全部みる
                    </button>
                </div>
            </div>

            <!-- 商品ラインナップ表示 -->
            <div id="prize-lineup" class="bg-white/85 p-4 text-center relative overflow-hidden">
                <i class="fas fa-gift absolute -right-4 -bottom-4 text-6xl text-pink-100 rotate-12"></i>
                <div class="relative z-10">
                    <span class="font-black text-pink-500 mr-2 bg-pink-50 px-3 py-1 rounded-full text-sm inline-block mb-1">今回のラインナップ</span>
                    <div id="lineup-text" class="text-slate-700 font-bold mt-1 text-lg"></div>
                </div>
            </div>

            <!-- キャンバスエリア -->
            <div class="canvas-container">
                <!-- キャンバス自体はstyle="width:100%"で縮小表示される -->
                <canvas id="amidaCanvas"></canvas>
            </div>

            <!-- 結果表示エリア -->
            <div id="result-message" class="hidden bg-white/90 p-6 animate-fade-in text-center relative overflow-visible">
                <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-pink-300 via-yellow-300 to-sky-300 rounded-t-lg"></div>
                <div id="result-text" class="text-xl text-slate-700 font-bold relative z-10"></div>
            </div>
        </div>

        <!-- 結果一覧モーダル -->
        <div id="summary-modal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4 animate-fade-in">
            <div class="bg-white/95 w-full max-w-lg relative max-h-[90vh] flex flex-col">
                <div class="p-6 text-center border-b border-pink-100">
                    <h2 class="text-3xl font-black text-pink-500">
                        <i class="fas fa-crown text-yellow-400 mr-2"></i>結果発表
                    </h2>
                    <p class="text-slate-400 font-bold text-sm mt-1">みんなの結果が出揃いました！</p>
                </div>
                <div class="p-6 overflow-y-auto custom-scrollbar flex-1">
                    <ul id="summary-list" class="space-y-3"></ul>
                </div>
                <div class="p-6 text-center bg-pink-50">
                    <button onclick="closeSummary()" class="btn-pop bg-pink-400 text-white font-black px-8 py-3">
                        閉じる
                    </button>
                </div>
            </div>
        </div>

    </main>

    <script>
        const MIN_COUNT = 2;
        const MAX_COUNT = 100;
        let currentCount = 4;

        let names = [];
        let results = [];
        let horizontalLines = [];
        let bulkItems = [];
        let animationDuration = 3000; // ms

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function drawRoundRect(ctx, x, y, w, h, r) {
            if (ctx.roundRect) {
                ctx.roundRect(x, y, w, h, r);
            } else {
                ctx.moveTo(x + r, y);
                ctx.arcTo(x + w, y, x + w, y + h, r);
                ctx.arcTo(x + w, y + h, x, y + h, r);
                ctx.arcTo(x, y + h, x, y, r);
                ctx.arcTo(x, y, x + w, y, r);
                ctx.closePath();
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function updateSpeedButtons(activeSpeed) {
            const baseClass = 'px-4 py-2 rounded-lg text-sm font-black border transition-all';
            ['slow', 'normal', 'fast'].forEach(speed => {
                const btn = document.getElementById(`speed-${speed}`);
                const stateClass = speed === activeSpeed
                    ? 'border-pink-300 bg-gradient-to-r from-pink-400 to-orange-300 text-white shadow-md shadow-pink-100'
                    : 'border-sky-100 bg-white/80 text-sky-500 hover:bg-sky-50';
                btn.className = `${baseClass} ${stateClass}`;
            });
        }

        function setSpeed(speed) {
            const speeds = { slow: 5000, normal: 3000, fast: 1200 };
            animationDuration = speeds[speed] || speeds.normal;
            updateSpeedButtons(speed);
        }

        function getPrizeStats() {
            const totalPrizes = bulkItems.reduce((sum, item) => sum + item.count, 0);
            const blankCount = Math.max(0, currentCount - totalPrizes);
            const overflowCount = Math.max(0, totalPrizes - currentCount);
            return { totalPrizes, blankCount, overflowCount };
        }

        function updatePrizePreview() {
            const { totalPrizes, blankCount, overflowCount } = getPrizeStats();
            document.getElementById('preview-people').textContent = `${currentCount}人`;
            document.getElementById('preview-prizes').textContent = `${totalPrizes}個`;
            document.getElementById('preview-blanks').textContent = `${blankCount}個`;

            const messageEl = document.getElementById('preview-message');
            if (totalPrizes === 0) {
                messageEl.textContent = 'まだ商品が入っていないよ。追加するとワクワク度アップ！';
            } else if (overflowCount > 0) {
                messageEl.textContent = `商品が ${overflowCount} 個ぶん多いので、スタート時にランダムで選ばれるよ。`;
            } else if (blankCount > 0) {
                messageEl.textContent = `あと ${blankCount} 枠ぶんは「★」になるよ。商品を増やすとぴったり揃えられるよ。`;
            } else {
                messageEl.textContent = 'ぴったり全員分そろったよ。きれいに配れる準備ばっちり！';
            }
        }

        const canvas = document.getElementById('amidaCanvas');
        const ctx = canvas.getContext('2d');
        
        // 内部解像度用の変数
        let logicalWidth, logicalHeight;
        const COL_WIDTH = 60; // 1列あたりの理想幅
        const MIN_LOGICAL_WIDTH = 300;
        const HEADER_HEIGHT = 80;
        const FOOTER_HEIGHT = 180; // 下部が見切れないようさらに余裕を持たせた（角丸クリッピング対策）
        const PADDING_SIDE = 60;
        
        const colors = [
            '#ffd1e4', '#fff0a8', '#c5f4da', '#cbeeff', '#ddd5ff',
            '#ffc9ba', '#e7f7a5', '#bff2ed', '#ffd7f0', '#d8ecff'
        ];
        const lineColors = [
            '#ff5f93', '#ff9f6e', '#f4c430', '#60cfa8', '#37bdf8',
            '#7c83ff', '#b66dff', '#ff73c5', '#21b7a8', '#f9737a'
        ];

        let paths = []; 
        let isAnimating = false;
        let revealed = new Array(MAX_COUNT).fill(false); 
        let revealedResults = new Array(MAX_COUNT).fill(false); 

        function init() {
            updateDisplays();
            updateBulkList();
            updateSpeedButtons('normal');
        }

        function updateDisplays() {
            document.getElementById('count-input').value = currentCount;
            updatePrizePreview();
        }

        function changeCount(delta) {
            const newCount = currentCount + delta;
            if (newCount >= MIN_COUNT && newCount <= MAX_COUNT) {
                currentCount = newCount;
                updateDisplays();
            }
        }

        function updateCountFromInput() {
            const val = parseInt(document.getElementById('count-input').value);
            if (!isNaN(val) && val >= MIN_COUNT && val <= MAX_COUNT) {
                currentCount = val;
            }
            updateDisplays();
        }

        function addBulkItem() {
            const nameInput = document.getElementById('bulk-name');
            const countInput = document.getElementById('bulk-count');
            const name = nameInput.value.trim();
            const count = parseInt(countInput.value);
            if (!name || count < 1) return;
            bulkItems.push({ name, count });
            nameInput.value = '';
            countInput.value = 1;
            nameInput.focus();
            updateBulkList();
        }

        function removeBulkItem(index) {
            bulkItems.splice(index, 1);
            updateBulkList();
        }

        function updateBulkList() {
            const listEl = document.getElementById('bulk-list');
            listEl.innerHTML = '';
            if (bulkItems.length === 0) {
                listEl.innerHTML = `<li class="text-slate-300 text-center py-6 flex flex-col items-center font-bold"><i class="fas fa-magic mb-2 text-pink-200 text-3xl"></i><span>ここに商品を追加してね！</span></li>`;
                updatePrizePreview();
                return;
            }
            bulkItems.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center gap-3 bg-white/86 px-4 py-3 rounded-lg border border-pink-100 shadow-sm animate-fade-in';
                li.innerHTML = `<div class="flex items-center gap-3 min-w-0 flex-1"><span class="w-10 h-10 rounded-lg bg-pink-50 border border-pink-100 flex items-center justify-center text-pink-400 font-bold text-lg shadow-sm flex-shrink-0"><i class="fas fa-gift"></i></span><div class="min-w-0 flex-1"><span class="font-bold text-slate-700 text-base md:text-lg break-all block">${escapeHtml(item.name)}</span><span class="text-slate-500 text-xs font-black bg-yellow-100/80 px-3 py-1 rounded-full border border-yellow-100 inline-block mt-2">× ${item.count}</span></div></div><button onclick="removeBulkItem(${index})" class="text-pink-400 hover:text-pink-500 w-8 h-8 flex items-center justify-center rounded-lg hover:bg-pink-50 transition flex-shrink-0" aria-label="商品を削除"><i class="fas fa-times"></i></button>`;
                listEl.appendChild(li);
            });
            updatePrizePreview();
        }

        function generateAmida() {
            results = [];
            bulkItems.forEach(item => {
                for (let i = 0; i < item.count; i++) results.push(item.name);
            });
            const currentLen = results.length;
            if (currentLen < currentCount) {
                for (let i = currentLen; i < currentCount; i++) results.push("★");
            } else if (currentLen > currentCount) {
                shuffle(results);
                results = results.slice(0, currentCount);
            }
            shuffle(results);

            const summary = {};
            let hasItem = false;
            results.forEach(r => { if (r !== "★") { summary[r] = (summary[r] || 0) + 1; hasItem = true; } });
            const summaryText = !hasItem ? "（商品なし...？）" : Object.entries(summary).map(([n, c]) => `${n}×${c}`).join(' / ');
            document.getElementById('lineup-text').textContent = summaryText;

            names = [];
            for (let i = 0; i < currentCount; i++) {
                names[i] = `${i + 1}`;
            }

            horizontalLines = [];
            const segments = Math.max(12, Math.floor(currentCount * 0.8)); 
            for (let s = 0; s < segments; s++) {
                const gaps = currentCount - 1;
                let candidates = [];
                for(let g=0; g<gaps; g++) candidates.push(g);
                shuffle(candidates);
                let used = new Array(gaps).fill(false);
                for(let g of candidates) {
                    if(used[g]) continue;
                    if(g > 0 && used[g-1]) continue;
                    if(g < gaps-1 && used[g+1]) continue;
                    if(Math.random() > 0.3) {
                        const segmentHeight = 0.8 / segments;
                        const baseY = 0.1 + (s * segmentHeight);
                        horizontalLines.push({ col: g, y: baseY + (Math.random() * 0.02) });
                        used[g] = true;
                    }
                }
            }
            horizontalLines.sort((a, b) => a.y - b.y);

            document.getElementById('setup-panel').classList.add('hidden');
            document.getElementById('game-panel').classList.remove('hidden');
            document.querySelector('header').classList.add('hidden'); 
            
            revealed = new Array(currentCount).fill(false);
            revealedResults = new Array(currentCount).fill(false);
            paths = [];
            isAnimating = false;
            document.getElementById('result-message').classList.add('hidden');
            closeSummary();

            setTimeout(resizeCanvas, 50);
        }

        function resetView() {
            document.getElementById('game-panel').classList.add('hidden');
            document.getElementById('setup-panel').classList.remove('hidden');
            document.querySelector('header').classList.remove('hidden');
            closeSummary();
        }

        function resetPaths() {
            if(isAnimating) return;
            generateAmida();
        }

        // --- 描画・リサイズ処理（核心部分） ---

        function resizeCanvas() {
            const container = document.querySelector('.canvas-container');
            const dpr = window.devicePixelRatio || 1;
            
            // 1. 描画の「土台」となる幅をコンテナの実際の幅に合わせる
            // 人数による計算（COL_WIDTH）とコンテナ幅の大きい方を採用
            const contentWidth = (currentCount * COL_WIDTH) + (PADDING_SIDE * 2);
            logicalWidth = Math.max(container.offsetWidth - (currentCount <= 5 ? 40 : 0), contentWidth, MIN_LOGICAL_WIDTH);
            logicalHeight = Math.max(800, logicalWidth * 0.8); // 縦にゆとりを持たせる
            
            // 2. 内部解像度を高精細にセット（リサイズ時のみ実行して負荷を軽減）
            canvas.width = logicalWidth * dpr;
            canvas.height = logicalHeight * dpr;
            
            // 3. 表示サイズ（CSS）— 幅はコンテナに合わせ、アスペクト比を維持
            canvas.style.width = '100%';
            canvas.style.height = 'auto';
            canvas.style.aspectRatio = `${logicalWidth} / ${logicalHeight}`;
            
            drawBoard();
        }

        function getColX(index) {
            const usableWidth = logicalWidth - (PADDING_SIDE * 2);
            const spacing = usableWidth / Math.max(1, currentCount - 1);
            return PADDING_SIDE + index * spacing;
        }

        function drawBoard(currentPathInfo = null) {
            const dpr = window.devicePixelRatio || 1;
            
            // スケールだけは描画のたびに確実に適用
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0); 
            ctx.clearRect(0, 0, logicalWidth, logicalHeight);
            
            const lineTop = HEADER_HEIGHT;
            const lineBottom = logicalHeight - FOOTER_HEIGHT;
            const lineHeight = lineBottom - lineTop;

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const colSpacing = (logicalWidth - (PADDING_SIDE * 2)) / Math.max(1, currentCount - 1);
            const baseSize = Math.min(54, colSpacing * 0.85);
            const radius = baseSize / 2;
            const fontSize = Math.max(14, radius * 0.7);

            // 1. 縦線
            ctx.lineWidth = 5;
            ctx.strokeStyle = '#f2dbe6';
            for (let i = 0; i < currentCount; i++) {
                const x = getColX(i);
                ctx.beginPath();
                ctx.moveTo(x, lineTop);
                ctx.lineTo(x, lineBottom);
                ctx.stroke();
            }

            // 2. 横線
            for (let line of horizontalLines) {
                const x1 = getColX(line.col);
                const x2 = getColX(line.col + 1);
                const y = lineTop + (line.y * lineHeight);

                ctx.beginPath();
                ctx.moveTo(x1, y);
                ctx.lineTo(x2, y);
                ctx.stroke();
            }

            // 3. 通過済みのパス
            paths.forEach(p => {
                drawPathLine(p.coords, lineColors[p.startIndex % lineColors.length]);
            });

            // 4. 現在アニメーション中のパスがあれば描画
            if (currentPathInfo) {
                const { segments, currentDist, color } = currentPathInfo;
                const pathCoords = [];
                let distRem = currentDist;
                pathCoords.push(segments[0].start);
                for(let seg of segments) {
                    if(distRem <= 0) break;
                    if(distRem >= seg.length) {
                        pathCoords.push(seg.end);
                        distRem -= seg.length;
                    } else {
                        const ratio = distRem / seg.length;
                        pathCoords.push({
                            x: seg.start.x + (seg.end.x - seg.start.x) * ratio,
                            y: seg.start.y + (seg.end.y - seg.start.y) * ratio
                        });
                        distRem = 0;
                    }
                }
                drawPathLine(pathCoords, color);
            }

            // 5. ノードと結果の描画
            for (let i = 0; i < currentCount; i++) {
                const x = getColX(i);
                const colorIdx = i % colors.length;
                const bgColor = colors[colorIdx];
                const lineColor = lineColors[colorIdx];
                
                // --- 参加者アイコン (上) ---
                ctx.beginPath();
                ctx.arc(x + 2, HEADER_HEIGHT / 2 + 4, radius + 3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(51, 65, 85, 0.12)';
                ctx.fill();

                ctx.beginPath();
                ctx.arc(x, HEADER_HEIGHT / 2, radius + 3, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                // 本体
                ctx.beginPath();
                ctx.arc(x, HEADER_HEIGHT / 2, radius, 0, Math.PI * 2);
                ctx.fillStyle = revealed[i] ? '#e5e7eb' : bgColor;
                ctx.fill();
                ctx.strokeStyle = revealed[i] ? '#cbd5e1' : lineColor;
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 光沢（POP感を出す）
                if (!revealed[i]) {
                    ctx.beginPath();
                    ctx.arc(x - radius*0.3, HEADER_HEIGHT/2 - radius*0.3, radius*0.2, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.fill();
                }

                ctx.fillStyle = revealed[i] ? '#94a3b8' : '#334155';
                ctx.font = `900 ${fontSize}px "M PLUS Rounded 1c"`;
                ctx.fillText(`${i+1}`, x, HEADER_HEIGHT / 2);
                
                // スタート地点のポッチ
                ctx.beginPath();
                ctx.arc(x, lineTop, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.strokeStyle = revealed[i] ? '#cbd5e1' : lineColor;
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(x, lineTop, 3, 0, Math.PI * 2);
                ctx.fillStyle = revealed[i] ? '#d1d5db' : lineColor;
                ctx.fill();

                // ボックス本体
                const isRevealed = revealedResults[i];
                const boxW = Math.min(Math.max(46, colSpacing * 0.9), PADDING_SIDE * 2 - 8);
                const boxH = 72; // 高さを固定して見切れを防止
                const boxY = lineBottom + 20; // フッターのゆとり分、少し下げる
                
                // ボックスの影
                ctx.fillStyle = 'rgba(51, 65, 85, 0.12)';
                ctx.beginPath();
                drawRoundRect(ctx, x - boxW/2 + 3, boxY + 5, boxW, boxH, 8);
                ctx.fill();
                
                ctx.fillStyle = isRevealed ? '#fff' : '#fffaf3';
                ctx.strokeStyle = isRevealed ? '#ff86b7' : '#eadce5';
                ctx.lineWidth = 2;
                ctx.beginPath();
                drawRoundRect(ctx, x - boxW/2, boxY, boxW, boxH, 8);
                ctx.fill();
                ctx.stroke();

                if (isRevealed) {
                    ctx.fillStyle = '#ff5f93';
                    const result = results[i];
                    let resFontSize = Math.min(18, boxW / 3.5);
                    ctx.font = `900 ${resFontSize}px "M PLUS Rounded 1c"`;
                    
                    const maxChars = Math.floor(boxW / resFontSize);
                    const displayResult = result.length > maxChars ? result.substring(0, maxChars) + '..' : result;
                    ctx.fillText(displayResult, x, boxY + boxH/2);
                } else {
                    ctx.fillStyle = '#ff86b7';
                    ctx.font = `900 ${Math.min(28, boxW/1.8)}px "M PLUS Rounded 1c"`;
                    ctx.fillText("?", x, boxY + boxH/2);
                }
            }
        }

        function calculatePath(startIndex) {
            let col = startIndex;
            let currentY = 0;
            const coords = [];
            const lineTop = HEADER_HEIGHT;
            const lineBottom = logicalHeight - FOOTER_HEIGHT;
            const lineHeight = lineBottom - lineTop;

            coords.push({ x: getColX(col), y: lineTop });

            for (let i = 0; i < horizontalLines.length; i++) {
                const line = horizontalLines[i];
                if (line.y > currentY) {
                    if (line.col === col - 1) {
                        const yPixel = lineTop + (line.y * lineHeight);
                        coords.push({ x: getColX(col), y: yPixel });
                        col = col - 1;
                        coords.push({ x: getColX(col), y: yPixel });
                        currentY = line.y;
                    }
                    else if (line.col === col) {
                        const yPixel = lineTop + (line.y * lineHeight);
                        coords.push({ x: getColX(col), y: yPixel });
                        col = col + 1;
                        coords.push({ x: getColX(col), y: yPixel });
                        currentY = line.y;
                    }
                }
            }
            coords.push({ x: getColX(col), y: lineBottom });
            return { startIndex, endIndex: col, coords };
        }

        /**
         * パスそのものを描画する（フチ付き）
         */
        function drawPathLine(coords, color) {
            if (coords.length < 2) return;

            // フチ
            ctx.lineWidth = 11;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.96)';
            ctx.beginPath();
            ctx.moveTo(coords[0].x, coords[0].y);
            for (let i = 1; i < coords.length; i++) ctx.lineTo(coords[i].x, coords[i].y);
            ctx.stroke();

            // メイン
            ctx.lineWidth = 7;
            ctx.strokeStyle = color;
            ctx.stroke();
        }

        function animateSinglePath(pathData, onComplete) {
            isAnimating = true;
            let totalLength = 0;
            const segments = [];
            for (let i = 0; i < pathData.coords.length - 1; i++) {
                const dx = pathData.coords[i + 1].x - pathData.coords[i].x;
                const dy = pathData.coords[i + 1].y - pathData.coords[i].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                segments.push({ start: pathData.coords[i], end: pathData.coords[i + 1], length: dist });
                totalLength += dist;
            }

            const startTime = performance.now();
            const color = lineColors[pathData.startIndex % lineColors.length];
            
            function loop(now) {
                const elapsed = now - startTime;
                const duration = animationDuration;
                let currentDist = (elapsed / duration) * totalLength;
                if (currentDist > totalLength) currentDist = totalLength;

                drawBoard({ segments, currentDist, color });

                if (currentDist < totalLength) {
                    requestAnimationFrame(loop);
                } else {
                    isAnimating = false;
                    paths.push(pathData);
                    revealedResults[pathData.endIndex] = true;
                    drawBoard();
                    showResult(pathData);
                    checkAllRevealed();
                    if(onComplete) onComplete();
                }
            }
            requestAnimationFrame(loop);
        }

        function showResult(pathData) {
            const startName = names[pathData.startIndex];
            const endResult = results[pathData.endIndex];
            const msgBox = document.getElementById('result-message');
            const msgText = document.getElementById('result-text');
            msgText.innerHTML = `<div class="mb-2 text-pink-400 text-sm font-black">🎉 結果発表 🎉</div><div class="text-xl mb-3"><span class="font-black text-sky-500 text-3xl">${escapeHtml(startName)}</span>番 は...</div><div class="text-4xl font-black text-pink-500 drop-shadow-sm animate-pulse">${escapeHtml(endResult)}</div>`;
            msgBox.classList.remove('hidden');
            setTimeout(() => msgBox.scrollIntoView({ behavior: 'smooth', block: 'end' }), 100);
        }

        function checkAllRevealed() {
            if (revealed.slice(0, currentCount).every(r => r === true)) {
                setTimeout(() => showSummary(), 1500);
            }
        }

        function showSummary() {
            const modal = document.getElementById('summary-modal');
            const list = document.getElementById('summary-list');
            list.innerHTML = '';
            for (let i = 0; i < currentCount; i++) {
                const pathData = calculatePath(i);
                const result = results[pathData.endIndex];
                const li = document.createElement('li');
                li.className = 'flex items-center justify-between p-3 bg-pink-50/80 rounded-lg border border-pink-100';
                li.innerHTML = `<div class="flex items-center gap-3"><span class="px-3 h-8 rounded-lg bg-white border border-pink-100 flex items-center justify-center font-black text-pink-500 shadow-sm text-sm">${escapeHtml(names[i])}</span><span class="text-slate-300 text-sm">➔</span><span class="font-bold text-slate-700 text-lg">${escapeHtml(result)}</span></div>`;
                list.appendChild(li);
            }
            modal.classList.remove('hidden');
        }

        function closeSummary() {
            document.getElementById('summary-modal').classList.add('hidden');
        }

        function handleCanvasInput(clientX, clientY) {
            if (isAnimating) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = logicalWidth / rect.width;
            const scaleY = logicalHeight / rect.height;

            const clickX = (clientX - rect.left) * scaleX;
            const clickY = (clientY - rect.top) * scaleY;

            if (clickY < HEADER_HEIGHT + 40) {
                const spacing = (logicalWidth - PADDING_SIDE * 2) / Math.max(1, currentCount - 1);
                const threshold = Math.min(40, spacing / 2);

                let clickedCol = -1;
                for (let i = 0; i < currentCount; i++) {
                    const cx = getColX(i);
                    if (Math.abs(clickX - cx) < threshold) {
                        clickedCol = i;
                        break;
                    }
                }
                if (clickedCol !== -1 && !revealed[clickedCol]) {
                    revealed[clickedCol] = true;
                    drawBoard();
                    const pathData = calculatePath(clickedCol);
                    animateSinglePath(pathData);
                }
            }
        }

        canvas.addEventListener('click', (e) => {
            handleCanvasInput(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleCanvasInput(touch.clientX, touch.clientY);
        }, { passive: false });

        async function revealAll() {
            if(isAnimating) return;
            const unrevealedIndices = [];
            for(let i=0; i<currentCount; i++) if(!revealed[i]) unrevealedIndices.push(i);
            
            if(unrevealedIndices.length === 0) { showSummary(); return; }

            for(let i of unrevealedIndices) {
                revealed[i] = true;
                const path = calculatePath(i);
                paths.push(path);
                revealedResults[path.endIndex] = true; 
            }
            drawBoard();
            const msgBox = document.getElementById('result-message');
            document.getElementById('result-text').textContent = "全員の結果を表示しました！";
            msgBox.classList.remove('hidden');
            setTimeout(() => msgBox.scrollIntoView({ behavior: 'smooth', block: 'end' }), 100);
            checkAllRevealed();
        }

        let resizeTimer;
        window.addEventListener('resize', () => {
            if (!document.getElementById('game-panel').classList.contains('hidden') && !isAnimating) {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(resizeCanvas, 200);
            }
        });

        document.getElementById('summary-modal').addEventListener('click', (e) => {
            if (e.target.id === 'summary-modal') {
                closeSummary();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeSummary();
            }
        });

        init();
    </script>
</body>
</html>
