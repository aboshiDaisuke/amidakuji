<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おみやげ配布⭐️あみだくじ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');
        
        :root {
            --pop-pink: #ff85a1;
            --pop-yellow: #ffd93d;
            --pop-blue: #6ebbfd;
            --pop-green: #6bcb77;
            --pop-white: #ffffff;
            --pop-bg: #fff5f8;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--pop-bg);
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255, 133, 161, 0.15) 2px, transparent 0);
            background-size: 32px 32px;
            color: #5c4b51;
            overflow-x: hidden;
        }

        /* ポップなフローティング装飾 */
        .pop-deco {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.05));
            animation: popFloating 6s ease-in-out infinite;
        }
        @keyframes popFloating {
            0%, 100% { transform: translateY(0) rotate(-5deg) scale(1); }
            50% { transform: translateY(-20px) rotate(5deg) scale(1.1); }
        }

        .canvas-container {
            position: relative;
            width: 100%;
            background: var(--pop-white);
            border: 6px solid #5c4b51; /* 太い縁取りでPOP感を出す */
            border-radius: 2rem;
            box-shadow: 8px 8px 0px #ffbdcb; /* ステッカー風の影 */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        canvas {
            cursor: pointer;
            display: block;
            width: 100%;
            height: auto;
            max-width: 100%;
        }

        /* ぷるんとしたボタン */
        .btn-pop {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid #5c4b51;
            box-shadow: 4px 4px 0px #5c4b51;
            font-weight: 900;
        }
        /* ふわふわ浮遊アニメーション */
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* ぷるんとしたボタンアニメーション */
        .btn-pop:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #5c4b51;
        }
        .btn-pop:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0px #5c4b51;
        }

        /* POPなパネル */
        .pop-card {
            background: var(--pop-white);
            border: 6px solid #5c4b51;
            border-radius: 2.5rem;
            box-shadow: 12px 12px 0px #ffd93d; /* 黄色のオフセット影 */
        }

        /* アニメーション */
        .animate-pop-in {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: var(--pop-bg);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--pop-pink);
            border: 2px solid #5c4b51;
            border-radius: 10px;
        }
        
        .modal-overlay {
            background-color: rgba(255, 133, 161, 0.3);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="p-4 pt-0 md:p-8 md:pt-1 pb-40 min-h-screen relative">

    <!-- 背景デコ -->
    <div class="pop-deco text-4xl" style="top: 10%; left: 5%; color: var(--pop-pink); animation-delay: 0s;"><i class="fas fa-heart"></i></div>
    <div class="pop-deco text-5xl" style="top: 15%; right: 5%; color: var(--pop-yellow); animation-delay: -1s;"><i class="fas fa-star"></i></div>
    <div class="pop-deco text-3xl" style="bottom: 20%; left: 8%; color: var(--pop-blue); animation-delay: -2s;"><i class="fas fa-cloud"></i></div>
    <div class="pop-deco text-4xl" style="bottom: 10%; right: 10%; color: var(--pop-green); animation-delay: -3s;"><i class="fas fa-gift"></i></div>

    <header class="mt-4 mb-2 text-center animate-pop-in relative">
        <div class="flex flex-col md:flex-row items-center justify-center gap-6">
            <!-- 広報キャラクター画像 (ふわふわ浮遊アニメーション - 少し下げて配置) -->
            <div class="relative w-22 h-auto md:w-32 filter drop-shadow-xl animate-float mt-4">
                <img src="assets/koho.png" alt="広報（お土産配布係）" class="w-full h-auto object-contain">
                <div class="absolute -top-1 -right-2 bg-yellow-400 text-gray-800 font-black text-[10px] px-2 py-0.5 rounded-full border-2 border-gray-800 rotate-12 shadow-sm">
                    お土産配るよ！
                </div>
            </div>

            <div class="text-center md:text-left">
                <!-- タイトル (ふわふわアニメーション) -->
                <div class="inline-block relative animate-float" style="animation-delay: -0.5s;">
                    <h1 class="text-4xl md:text-6xl font-black text-white relative z-10 py-3 px-8 italic" style="-webkit-text-stroke: 3px #5c4b51; text-shadow: 6px 6px 0px #5c4b51;">
                        あみだくじ★
                    </h1>
                    <div class="absolute inset-0 bg-pink-400 -rotate-2 rounded-xl -z-10 border-4 border-gray-800"></div>
                </div>
                <!-- メッセージ (さらにズレてふわふわ) -->
                <div class="mt-4 animate-float" style="animation-delay: -1.2s;">
                    <p class="text-gray-600 font-black bg-white border-4 border-gray-800 inline-block px-5 py-2 rounded-full shadow-[4px_4px_0px_#5c4b51] text-xs md:text-sm">
                        ドキドキ！何が当たるかな？ 🎁
                    </p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto relative z-10 mb-20">

        <!-- 設定エリア -->
        <div id="setup-panel" class="pop-card p-6 md:p-10 animate-fade-in">
            
            <!-- 上段：人数設定 -->
            <div class="flex flex-col items-center justify-center mb-8 pb-6 border-b-2 border-dashed border-pink-200">
                <label class="font-bold text-xl text-gray-600 mb-4 flex items-center">
                    <span class="bg-blue-100 text-blue-500 rounded-full w-8 h-8 flex items-center justify-center mr-2"><i class="fas fa-users"></i></span>
                    参加人数を決めてね
                </label>
                <div class="flex items-center bg-pink-50 rounded-2xl p-2 shadow-inner gap-4 border-2 border-pink-100">
                    <button onclick="changeCount(-1)" class="btn-pop w-12 h-12 rounded-xl bg-white text-pink-500 font-black text-2xl shadow-sm border border-pink-100 flex-shrink-0">-</button>
                    <input type="number" id="count-input" value="4" min="2" max="100" onchange="updateCountFromInput()" class="w-24 text-center font-black text-4xl text-gray-700 bg-transparent focus:outline-none focus:bg-white rounded-lg p-1">
                    <button onclick="changeCount(1)" class="btn-pop w-12 h-12 rounded-xl bg-white text-pink-500 font-black text-2xl shadow-sm border border-pink-100 flex-shrink-0">+</button>
                </div>
                <p class="text-xs text-gray-400 mt-2">※画面に合わせて縮小表示されます</p>
            </div>

            <!-- 中段：商品設定 -->
            <div class="bg-yellow-50 p-6 rounded-[1.5rem] mb-8 border-2 border-yellow-200 relative">
                <div class="absolute -top-4 left-6 bg-yellow-400 text-white font-bold px-4 py-1 rounded-full text-sm shadow-md transform -rotate-2">
                    <i class="fas fa-gift mr-1"></i> 商品リスト
                </div>

                <div class="flex flex-wrap gap-3 mb-4 items-end mt-2">
                    <div class="flex-1 min-w-[140px]">
                        <label class="text-xs text-yellow-700 font-bold ml-2">なにが当たる？</label>
                        <input type="text" id="bulk-name" placeholder="例: 🍰 ケーキ" class="w-full border-2 border-yellow-200 rounded-2xl px-4 py-3 focus:outline-none focus:border-yellow-400 focus:ring-4 focus:ring-yellow-100 bg-white font-bold text-gray-700 placeholder-yellow-200 transition-all" onkeydown="if(event.key==='Enter') addBulkItem()">
                    </div>
                    <div class="w-24">
                        <label class="text-xs text-yellow-700 font-bold ml-2">いくつ？</label>
                        <input type="number" id="bulk-count" value="1" min="1" class="w-full border-2 border-yellow-200 rounded-2xl px-3 py-3 focus:outline-none focus:border-yellow-400 focus:ring-4 focus:ring-yellow-100 text-center bg-white font-bold text-gray-700">
                    </div>
                    <button onclick="addBulkItem()" class="btn-pop bg-yellow-400 text-white font-bold px-6 py-3 rounded-2xl shadow-md h-[52px] border-b-4 border-yellow-500 active:border-b-0 active:translate-y-1">
                        <i class="fas fa-plus"></i> 追加
                    </button>
                </div>

                <div class="bg-white rounded-2xl p-4 shadow-inner border border-yellow-100 min-h-[100px] max-h-[300px] overflow-y-auto custom-scrollbar">
                    <ul id="bulk-list" class="space-y-2">
                        <li class="text-gray-300 text-center py-6 flex flex-col items-center font-bold">
                            <i class="fas fa-magic mb-2 text-yellow-200 text-3xl"></i>
                            <span>ここに商品を追加してね！</span>
                        </li>
                    </ul>
                </div>
                
                <p class="text-right text-xs text-yellow-600 font-bold mt-2 mr-2">
                    ※入力が人数より少ない分は「★」になります
                </p>
            </div>

            <!-- アニメーション速度 -->
            <div class="flex items-center justify-center gap-3 mb-6">
                <span class="text-sm font-bold text-gray-500"><i class="fas fa-gauge mr-1"></i>速さ</span>
                <div class="flex gap-2">
                    <button onclick="setSpeed('slow')" id="speed-slow" class="btn-pop px-4 py-2 rounded-full text-sm font-bold border-2 border-blue-200 bg-blue-50 text-blue-500">おそい</button>
                    <button onclick="setSpeed('normal')" id="speed-normal" class="btn-pop px-4 py-2 rounded-full text-sm font-bold border-2 border-pink-400 bg-pink-400 text-white">ふつう</button>
                    <button onclick="setSpeed('fast')" id="speed-fast" class="btn-pop px-4 py-2 rounded-full text-sm font-bold border-2 border-blue-200 bg-blue-50 text-blue-500">はやい</button>
                </div>
            </div>

            <!-- 作成ボタン -->
            <div class="text-center">
                <button onclick="generateAmida()" class="btn-pop w-full md:w-2/3 px-12 py-5 bg-gradient-to-r from-pink-400 to-rose-400 text-white text-xl rounded-full font-black shadow-lg shadow-pink-200 border-b-4 border-rose-500 active:border-b-0 active:translate-y-1 flex items-center justify-center mx-auto tracking-wider">
                    <i class="fas fa-wand-magic-sparkles mr-2"></i> スタート！
                </button>
            </div>
        </div>

        <!-- あみだくじ表示エリア -->
        <div id="game-panel" class="hidden space-y-6 animate-fade-in pb-20">
            
            <div class="flex flex-wrap justify-between items-center bg-white/80 backdrop-blur p-4 rounded-2xl shadow-sm border-2 border-pink-100 gap-3">
                <button onclick="resetView()" class="text-pink-400 hover:text-pink-600 font-bold px-3 py-1 btn-pop">
                    <i class="fas fa-chevron-left mr-1"></i> もどる
                </button>
                <div class="flex gap-3">
                     <button onclick="resetPaths()" class="px-5 py-2 bg-gray-100 text-gray-600 rounded-xl font-bold hover:bg-gray-200 transition btn-pop text-sm">
                        <i class="fas fa-undo mr-1"></i> もう一回
                    </button>
                    <button onclick="revealAll()" class="px-5 py-2 bg-blue-400 text-white rounded-xl font-bold hover:bg-blue-500 transition shadow-md shadow-blue-200 btn-pop text-sm">
                        <i class="fas fa-eye mr-1"></i> 全部みる
                    </button>
                </div>
            </div>

            <!-- 商品ラインナップ表示 -->
            <div id="prize-lineup" class="bg-yellow-100 border-2 border-yellow-300 p-4 rounded-2xl text-center shadow-sm relative overflow-hidden">
                <i class="fas fa-gift absolute -right-4 -bottom-4 text-6xl text-yellow-200/50 rotate-12"></i>
                <div class="relative z-10">
                    <span class="font-black text-yellow-700 mr-2 bg-white px-3 py-1 rounded-full text-sm inline-block mb-1">今回のラインナップ</span>
                    <div id="lineup-text" class="text-gray-700 font-bold mt-1 text-lg"></div>
                </div>
            </div>

            <!-- キャンバスエリア -->
            <div class="canvas-container">
                <!-- キャンバス自体はstyle="width:100%"で縮小表示される -->
                <canvas id="amidaCanvas"></canvas>
            </div>

            <!-- 結果表示エリア -->
            <div id="result-message" class="hidden bg-white p-6 rounded-[2rem] shadow-xl border-4 border-pink-300 animate-fade-in text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-pink-300 via-yellow-300 to-blue-300"></div>
                <p id="result-text" class="text-xl text-gray-700 font-bold relative z-10"></p>
            </div>
        </div>

        <!-- 結果一覧モーダル -->
        <div id="summary-modal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4 animate-fade-in">
            <div class="bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl border-4 border-pink-200 relative max-h-[90vh] flex flex-col">
                <div class="p-6 text-center border-b-2 border-dashed border-pink-100">
                    <h2 class="text-3xl font-black text-pink-500">
                        <i class="fas fa-crown text-yellow-400 mr-2"></i>結果発表
                    </h2>
                    <p class="text-gray-400 font-bold text-sm mt-1">みんなの結果が出揃いました！</p>
                </div>
                <div class="p-6 overflow-y-auto custom-scrollbar flex-1">
                    <ul id="summary-list" class="space-y-3"></ul>
                </div>
                <div class="p-6 text-center bg-pink-50 rounded-b-[2rem]">
                    <button onclick="closeSummary()" class="btn-pop bg-pink-400 text-white font-bold px-8 py-3 rounded-full shadow-lg border-b-4 border-pink-500 active:border-b-0 active:translate-y-1">
                        閉じる
                    </button>
                </div>
            </div>
        </div>

    </main>

    <script>
        const MIN_COUNT = 2;
        const MAX_COUNT = 100;
        let currentCount = 4;

        let names = [];
        let results = [];
        let horizontalLines = [];
        let bulkItems = [];
        let animationDuration = 3000; // ms

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function setSpeed(speed) {
            const speeds = { slow: 5000, normal: 3000, fast: 1200 };
            animationDuration = speeds[speed];
            ['slow', 'normal', 'fast'].forEach(s => {
                const btn = document.getElementById(`speed-${s}`);
                if (s === speed) {
                    btn.className = btn.className.replace('border-blue-200 bg-blue-50 text-blue-500', 'border-pink-400 bg-pink-400 text-white');
                } else {
                    btn.className = btn.className.replace('border-pink-400 bg-pink-400 text-white', 'border-blue-200 bg-blue-50 text-blue-500');
                }
            });
        }

        const canvas = document.getElementById('amidaCanvas');
        const ctx = canvas.getContext('2d');
        
        // 内部解像度用の変数
        let logicalWidth, logicalHeight;
        const COL_WIDTH = 60; // 1列あたりの理想幅
        const MIN_LOGICAL_WIDTH = 300;
        const HEADER_HEIGHT = 80;
        const FOOTER_HEIGHT = 100; // 結果が見切れないように十分確保
        const PADDING_SIDE = 40;
        
        const colors = [
            '#ff99c8', '#fcf6bd', '#d0f4de', '#a9def9', '#e4c1f9', 
            '#ffadad', '#ffd6a5', '#fdffb6', '#caffbf', '#9bf6ff'
        ];
        const lineColors = [
            '#ef4444', '#f97316', '#f59e0b', '#84cc16', '#10b981', 
            '#06b6d4', '#3b82f6', '#8b5cf6', '#d946ef', '#f43f5e'
        ];

        let paths = []; 
        let isAnimating = false;
        let revealed = new Array(MAX_COUNT).fill(false); 
        let revealedResults = new Array(MAX_COUNT).fill(false); 

        function init() {
            updateDisplays();
            updateBulkList();
        }

        function updateDisplays() {
            document.getElementById('count-input').value = currentCount;
        }

        function changeCount(delta) {
            const newCount = currentCount + delta;
            if (newCount >= MIN_COUNT && newCount <= MAX_COUNT) {
                currentCount = newCount;
                updateDisplays();
            }
        }

        function updateCountFromInput() {
            const val = parseInt(document.getElementById('count-input').value);
            if (!isNaN(val) && val >= MIN_COUNT && val <= MAX_COUNT) {
                currentCount = val;
            } else {
                updateDisplays();
            }
        }

        function addBulkItem() {
            const nameInput = document.getElementById('bulk-name');
            const countInput = document.getElementById('bulk-count');
            const name = nameInput.value.trim();
            const count = parseInt(countInput.value);
            if (!name || count < 1) return;
            bulkItems.push({ name, count });
            nameInput.value = '';
            countInput.value = 1;
            nameInput.focus();
            updateBulkList();
        }

        function removeBulkItem(index) {
            bulkItems.splice(index, 1);
            updateBulkList();
        }

        function updateBulkList() {
            const listEl = document.getElementById('bulk-list');
            listEl.innerHTML = '';
            if (bulkItems.length === 0) {
                listEl.innerHTML = `<li class="text-gray-300 text-center py-6 flex flex-col items-center font-bold"><i class="fas fa-magic mb-2 text-yellow-200 text-3xl"></i><span>ここに商品を追加してね！</span></li>`;
                return;
            }
            bulkItems.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center bg-yellow-50 px-4 py-3 rounded-xl border border-yellow-200 shadow-sm animate-fade-in';
                li.innerHTML = `<div class="flex items-center gap-3"><span class="w-10 h-10 rounded-full bg-white border-2 border-yellow-200 flex items-center justify-center text-yellow-500 font-bold text-lg shadow-sm"><i class="fas fa-gift"></i></span><span class="font-bold text-gray-700 text-lg">${escapeHtml(item.name)}</span><span class="text-yellow-600 text-xs font-bold bg-yellow-100 px-3 py-1 rounded-full border border-yellow-200">× ${item.count}</span></div><button onclick="removeBulkItem(${index})" class="text-red-400 hover:text-red-500 w-8 h-8 flex items-center justify-center rounded-full hover:bg-red-50 transition"><i class="fas fa-times"></i></button>`;
                listEl.appendChild(li);
            });
        }

        function generateAmida() {
            results = [];
            bulkItems.forEach(item => {
                for (let i = 0; i < item.count; i++) results.push(item.name);
            });
            const currentLen = results.length;
            if (currentLen < currentCount) {
                for (let i = currentLen; i < currentCount; i++) results.push("★");
            } else if (currentLen > currentCount) {
                shuffle(results);
                results = results.slice(0, currentCount);
            }
            shuffle(results);

            const summary = {};
            let hasItem = false;
            results.forEach(r => { if (r !== "★") { summary[r] = (summary[r] || 0) + 1; hasItem = true; } });
            const summaryText = !hasItem ? "（商品なし...？）" : Object.entries(summary).map(([n, c]) => `${n}×${c}`).join(' / ');
            document.getElementById('lineup-text').textContent = summaryText;

            names = [];
            for (let i = 0; i < currentCount; i++) {
                names[i] = `${i + 1}`;
            }

            horizontalLines = [];
            const segments = Math.max(12, Math.floor(currentCount * 0.8)); 
            for (let s = 0; s < segments; s++) {
                const gaps = currentCount - 1;
                let candidates = [];
                for(let g=0; g<gaps; g++) candidates.push(g);
                shuffle(candidates);
                let used = new Array(gaps).fill(false);
                for(let g of candidates) {
                    if(used[g]) continue;
                    if(g > 0 && used[g-1]) continue;
                    if(g < gaps-1 && used[g+1]) continue;
                    if(Math.random() > 0.3) {
                        const segmentHeight = 0.8 / segments;
                        const baseY = 0.1 + (s * segmentHeight);
                        horizontalLines.push({ col: g, y: baseY + (Math.random() * 0.02) });
                        used[g] = true;
                    }
                }
            }
            horizontalLines.sort((a, b) => a.y - b.y);

            document.getElementById('setup-panel').classList.add('hidden');
            document.getElementById('game-panel').classList.remove('hidden');
            document.querySelector('header').classList.add('hidden'); 
            
            revealed = new Array(currentCount).fill(false);
            revealedResults = new Array(currentCount).fill(false);
            paths = [];
            isAnimating = false;
            document.getElementById('result-message').classList.add('hidden');
            closeSummary();

            setTimeout(resizeCanvas, 50);
        }

        function resetView() {
            document.getElementById('game-panel').classList.add('hidden');
            document.getElementById('setup-panel').classList.remove('hidden');
            document.querySelector('header').classList.remove('hidden');
            closeSummary();
        }

        function resetPaths() {
            if(isAnimating) return;
            generateAmida();
        }

        // --- 描画・リサイズ処理（核心部分） ---

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            
            // 1. 論理サイズを決定
            logicalWidth = Math.max(MIN_LOGICAL_WIDTH, (currentCount * COL_WIDTH) + (PADDING_SIDE * 2));
            logicalHeight = Math.max(600, logicalWidth * 0.6); 
            
            // 2. キャンバスの内部解像度を高精細にする
            canvas.width = logicalWidth * dpr;
            canvas.height = logicalHeight * dpr;
            
            // 3. 表示サイズ（CSS）を固定
            canvas.style.width = logicalWidth + "px";
            canvas.style.height = logicalHeight + "px";
            
            // 4. スケールを適用（これがないとぼやける）
            ctx.resetTransform();
            ctx.scale(dpr, dpr);

            drawBoard();
        }

        function getColX(index) {
            const usableWidth = logicalWidth - (PADDING_SIDE * 2);
            const spacing = usableWidth / Math.max(1, currentCount - 1);
            return PADDING_SIDE + index * spacing;
        }

        /**
         * 描画の主要関数
         * @param {Object} currentPathInfo - 現在アニメーション中のデータがあれば渡す
         */
        function drawBoard(currentPathInfo = null) {
            ctx.clearRect(0, 0, logicalWidth, logicalHeight);
            
            const lineTop = HEADER_HEIGHT;
            const lineBottom = logicalHeight - FOOTER_HEIGHT;
            const lineHeight = lineBottom - lineTop;

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const colSpacing = (logicalWidth - (PADDING_SIDE * 2)) / Math.max(1, currentCount - 1);
            const baseSize = Math.min(54, colSpacing * 0.85);
            const radius = baseSize / 2;
            const fontSize = Math.max(14, radius * 0.7);

            // 1. 縦線（少し太めに）
            ctx.lineWidth = 6;
            ctx.strokeStyle = '#ffdee6'; 
            for (let i = 0; i < currentCount; i++) {
                const x = getColX(i);
                ctx.beginPath();
                ctx.moveTo(x, lineTop);
                ctx.lineTo(x, lineBottom);
                ctx.stroke();
            }

            // 2. 横線
            for (let line of horizontalLines) {
                const x1 = getColX(line.col);
                const x2 = getColX(line.col + 1);
                const y = lineTop + (line.y * lineHeight);

                ctx.beginPath();
                ctx.moveTo(x1, y);
                ctx.lineTo(x2, y);
                ctx.stroke();
            }

            // 3. 通過済みのパス
            paths.forEach(p => {
                drawPathLine(p.coords, lineColors[p.startIndex % lineColors.length]);
            });

            // 4. 現在アニメーション中のパスがあれば描画
            if (currentPathInfo) {
                const { segments, currentDist, color } = currentPathInfo;
                const pathCoords = [];
                let distRem = currentDist;
                pathCoords.push(segments[0].start);
                for(let seg of segments) {
                    if(distRem <= 0) break;
                    if(distRem >= seg.length) {
                        pathCoords.push(seg.end);
                        distRem -= seg.length;
                    } else {
                        const ratio = distRem / seg.length;
                        pathCoords.push({
                            x: seg.start.x + (seg.end.x - seg.start.x) * ratio,
                            y: seg.start.y + (seg.end.y - seg.start.y) * ratio
                        });
                        distRem = 0;
                    }
                }
                drawPathLine(pathCoords, color, true); // trueで発光エフェクト
            }

            // 5. ノードと結果の描画
            for (let i = 0; i < currentCount; i++) {
                const x = getColX(i);
                const colorIdx = i % colors.length;
                const bgColor = colors[colorIdx];
                const lineColor = lineColors[colorIdx];
                
                // --- 参加者アイコン (上) ---
                // 外側の太い縁取り（ステッカー風）
                ctx.beginPath();
                ctx.arc(x, HEADER_HEIGHT / 2, radius + 3, 0, Math.PI * 2);
                ctx.fillStyle = '#5c4b51';
                ctx.fill();

                // 本体
                ctx.beginPath();
                ctx.arc(x, HEADER_HEIGHT / 2, radius, 0, Math.PI * 2);
                ctx.fillStyle = revealed[i] ? '#e5e7eb' : bgColor;
                ctx.fill();
                
                // 光沢（POP感を出す）
                if (!revealed[i]) {
                    ctx.beginPath();
                    ctx.arc(x - radius*0.3, HEADER_HEIGHT/2 - radius*0.3, radius*0.2, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.fill();
                }

                ctx.fillStyle = revealed[i] ? '#9ca3af' : '#5c4b51'; 
                ctx.font = `900 ${fontSize}px "M PLUS Rounded 1c"`;
                ctx.fillText(`${i+1}`, x, HEADER_HEIGHT / 2);
                
                // スタート地点のポッチ
                ctx.beginPath();
                ctx.arc(x, lineTop, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#5c4b51';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x, lineTop, 3, 0, Math.PI * 2);
                ctx.fillStyle = revealed[i] ? '#d1d5db' : lineColor;
                ctx.fill();

                // --- 結果ボックス (下) ---
                const isRevealed = revealedResults[i];
                const boxW = Math.max(46, colSpacing * 0.9);
                const boxH = FOOTER_HEIGHT - 30;
                const boxY = lineBottom + 15;

                // ボックスの影（ステッカー風）
                ctx.fillStyle = '#5c4b51';
                ctx.beginPath();
                if (ctx.roundRect) ctx.roundRect(x - boxW/2 + 4, boxY + 4, boxW, boxH, 12);
                ctx.fill();

                // ボックス本体
                ctx.fillStyle = isRevealed ? '#fff' : '#fff9f0';
                ctx.strokeStyle = '#5c4b51';
                ctx.lineWidth = 3;
                ctx.beginPath();
                if (ctx.roundRect) ctx.roundRect(x - boxW/2, boxY, boxW, boxH, 12);
                ctx.fill();
                ctx.stroke();

                if (isRevealed) {
                    ctx.fillStyle = '#ff5a8d'; // POPな強めのピンク
                    const result = results[i];
                    let resFontSize = Math.min(18, boxW / 3.5);
                    ctx.font = `900 ${resFontSize}px "M PLUS Rounded 1c"`;
                    
                    const maxChars = Math.floor(boxW / resFontSize);
                    const displayResult = result.length > maxChars ? result.substring(0, maxChars) + '..' : result;
                    ctx.fillText(displayResult, x, boxY + boxH/2);
                } else {
                    ctx.fillStyle = '#ff85a1';
                    ctx.font = `900 ${Math.min(28, boxW/1.8)}px "M PLUS Rounded 1c"`;
                    ctx.fillText("?", x, boxY + boxH/2);
                }
            }
        }

        function calculatePath(startIndex) {
            let col = startIndex;
            let currentY = 0;
            const coords = [];
            const lineTop = HEADER_HEIGHT;
            const lineBottom = logicalHeight - FOOTER_HEIGHT;
            const lineHeight = lineBottom - lineTop;

            coords.push({ x: getColX(col), y: lineTop });

            for (let i = 0; i < horizontalLines.length; i++) {
                const line = horizontalLines[i];
                if (line.y > currentY) {
                    if (line.col === col - 1) {
                        const yPixel = lineTop + (line.y * lineHeight);
                        coords.push({ x: getColX(col), y: yPixel });
                        col = col - 1;
                        coords.push({ x: getColX(col), y: yPixel });
                        currentY = line.y;
                    }
                    else if (line.col === col) {
                        const yPixel = lineTop + (line.y * lineHeight);
                        coords.push({ x: getColX(col), y: yPixel });
                        col = col + 1;
                        coords.push({ x: getColX(col), y: yPixel });
                        currentY = line.y;
                    }
                }
            }
            coords.push({ x: getColX(col), y: lineBottom });
            return { startIndex, endIndex: col, coords };
        }

        /**
         * パスそのものを描画する（フチ付き）
         */
        function drawPathLine(coords, color, isAnimating = false) {
            if (coords.length < 2) return;

            // フチ
            ctx.lineWidth = 10;
            ctx.strokeStyle = '#5c4b51';
            ctx.beginPath();
            ctx.moveTo(coords[0].x, coords[0].y);
            for (let i = 1; i < coords.length; i++) ctx.lineTo(coords[i].x, coords[i].y);
            ctx.stroke();

            // メイン
            ctx.lineWidth = 6;
            ctx.strokeStyle = color;
            if (isAnimating) {
                ctx.shadowBlur = 15;
                ctx.shadowColor = color;
            }
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function animateSinglePath(pathData, onComplete) {
            isAnimating = true;
            let totalLength = 0;
            const segments = [];
            for (let i = 0; i < pathData.coords.length - 1; i++) {
                const dx = pathData.coords[i + 1].x - pathData.coords[i].x;
                const dy = pathData.coords[i + 1].y - pathData.coords[i].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                segments.push({ start: pathData.coords[i], end: pathData.coords[i + 1], length: dist });
                totalLength += dist;
            }

            const startTime = performance.now();
            const color = lineColors[pathData.startIndex % lineColors.length];
            
            function loop(now) {
                const elapsed = now - startTime;
                const duration = animationDuration;
                let currentDist = (elapsed / duration) * totalLength;
                if (currentDist > totalLength) currentDist = totalLength;

                drawBoard();

                ctx.lineWidth = 6;
                ctx.strokeStyle = color;
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.moveTo(segments[0].start.x, segments[0].start.y);

                let distRem = currentDist;
                for(let seg of segments) {
                    if(distRem <= 0) break;
                    if(distRem >= seg.length) {
                        ctx.lineTo(seg.end.x, seg.end.y);
                        distRem -= seg.length;
                    } else {
                        const ratio = distRem / seg.length;
                        const mx = seg.start.x + (seg.end.x - seg.start.x) * ratio;
                        const my = seg.start.y + (seg.end.y - seg.start.y) * ratio;
                        ctx.lineTo(mx, my);
                        distRem = 0;
                    }
                }
                ctx.stroke();

                if (currentDist < totalLength) {
                    requestAnimationFrame(loop);
                } else {
                    isAnimating = false;
                    paths.push(pathData);
                    revealedResults[pathData.endIndex] = true;
                    drawBoard();
                    showResult(pathData);
                    checkAllRevealed();
                    if(onComplete) onComplete();
                }
            }
            requestAnimationFrame(loop);
        }

        function showResult(pathData) {
            const startName = names[pathData.startIndex];
            const endResult = results[pathData.endIndex];
            const msgBox = document.getElementById('result-message');
            const msgText = document.getElementById('result-text');
            msgText.innerHTML = `<div class="mb-2 text-pink-400 text-sm font-bold">🎉 結果発表 🎉</div><div class="text-xl mb-3"><span class="font-black text-blue-500 text-3xl">${escapeHtml(startName)}</span>番 は...</div><div class="text-4xl font-black text-pink-500 drop-shadow-sm animate-pulse">${escapeHtml(endResult)}</div>`;
            msgBox.classList.remove('hidden');
            msgBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function checkAllRevealed() {
            if (revealed.slice(0, currentCount).every(r => r === true)) {
                setTimeout(() => showSummary(), 1500);
            }
        }

        function showSummary() {
            const modal = document.getElementById('summary-modal');
            const list = document.getElementById('summary-list');
            list.innerHTML = '';
            for (let i = 0; i < currentCount; i++) {
                const pathData = calculatePath(i);
                const result = results[pathData.endIndex];
                const li = document.createElement('li');
                li.className = 'flex items-center justify-between p-3 bg-pink-50 rounded-xl border border-pink-100';
                li.innerHTML = `<div class="flex items-center gap-3"><span class="px-3 h-8 rounded-full bg-white border border-pink-200 flex items-center justify-center font-black text-pink-500 shadow-sm text-sm">${escapeHtml(names[i])}</span><span class="text-gray-400 text-sm">➔</span><span class="font-bold text-gray-700 text-lg">${escapeHtml(result)}</span></div>`;
                list.appendChild(li);
            }
            modal.classList.remove('hidden');
        }

        function closeSummary() {
            document.getElementById('summary-modal').classList.add('hidden');
        }

        function handleCanvasInput(clientX, clientY) {
            if (isAnimating) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = logicalWidth / rect.width;
            const scaleY = logicalHeight / rect.height;

            const clickX = (clientX - rect.left) * scaleX;
            const clickY = (clientY - rect.top) * scaleY;

            if (clickY < HEADER_HEIGHT + 40) {
                const spacing = (logicalWidth - PADDING_SIDE * 2) / Math.max(1, currentCount - 1);
                const threshold = Math.min(40, spacing / 2);

                let clickedCol = -1;
                for (let i = 0; i < currentCount; i++) {
                    const cx = getColX(i);
                    if (Math.abs(clickX - cx) < threshold) {
                        clickedCol = i;
                        break;
                    }
                }
                if (clickedCol !== -1 && !revealed[clickedCol]) {
                    revealed[clickedCol] = true;
                    drawBoard();
                    const pathData = calculatePath(clickedCol);
                    animateSinglePath(pathData);
                }
            }
        }

        canvas.addEventListener('click', (e) => {
            handleCanvasInput(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleCanvasInput(touch.clientX, touch.clientY);
        }, { passive: false });

        async function revealAll() {
            if(isAnimating) return;
            const unrevealedIndices = [];
            for(let i=0; i<currentCount; i++) if(!revealed[i]) unrevealedIndices.push(i);
            
            if(unrevealedIndices.length === 0) { showSummary(); return; }

            for(let i of unrevealedIndices) {
                revealed[i] = true;
                const path = calculatePath(i);
                paths.push(path);
                revealedResults[path.endIndex] = true; 
            }
            drawBoard();
            const msgBox = document.getElementById('result-message');
            document.getElementById('result-text').textContent = "全員の結果を表示しました！";
            msgBox.classList.remove('hidden');
            msgBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            checkAllRevealed();
        }

        let resizeTimer;
        window.addEventListener('resize', () => {
            if (!document.getElementById('game-panel').classList.contains('hidden') && !isAnimating) {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(resizeCanvas, 200);
            }
        });

        init();
    </script>
</body>
</html>
